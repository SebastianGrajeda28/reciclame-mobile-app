version: '3.8'

# Solo postgres como fallback.
# Para el stack completo (API, Studio, Auth, Storage) usar: npm run db:start

services:
  postgres:
    env_file:
      - .env.local
    image: supabase/postgres:15.8.1.060
    container_name: reciclame-postgres
    environment:
      POSTGRES_INITDB_ARGS: '--encoding=UTF8'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
