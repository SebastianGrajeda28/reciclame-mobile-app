project_id = "reciclame-mobile-app"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.migrations]
schema_paths = [
  "./schemas/00_overview.sql",
  "./schemas/01_schemas.sql",
  "./schemas/10_reference_data.sql",
  "./schemas/20_identity_access.sql",
  "./schemas/30_profile.sql",
  "./schemas/35_social.sql",
  "./schemas/40_geo_infrastructure.sql",
  "./schemas/45_offline_sync.sql",
  "./schemas/50_recycling_flow.sql",
  "./schemas/60_education_content.sql",
  "./schemas/70_gamification.sql",
  "./schemas/80_admin_analytics.sql",
  "./schemas/95_permissions.sql",
]

[realtime]
enabled = false

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = false
port = 54324

[storage]
enabled = false
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:8081"
additional_redirect_urls = ["exp://localhost:8081", "reciclamemobileapp://oauth"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"

[analytics]
enabled = false
