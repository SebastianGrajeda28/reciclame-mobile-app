name: CI Estándar de Programación

on:
  push:
    branches: [ main, develop ]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Habilitar Corepack
        run: corepack enable

      - name: Instalación de dependencias
        run: yarn install --immutable

      # 1. Verificación de Estilo y Tipado
      - name: Ejecutar Lint (Check de any, PascalCase, Indentación)
        run: yarn lint

      # 2. Verificación de Tests Unitarios
      - name: Ejecutar Tests Unitarios
        run: yarn test:coverage
        env:
          CI: true

      # 3. Verificación de Build
      - name: Validar compilación de TypeScript
        run: yarn typecheck
