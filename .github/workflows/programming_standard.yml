name: CI Estándar de Programación

on:
  push:
    branches: [ main, develop ]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 'latest'

      - name: Instalación de dependencias
        run: bun install

      # 1. Verificación de Estilo y Tipado
      - name: Ejecutar Lint (Check de any, PascalCase, Indentación)
        run: bun run lint

      # 2. Verificación de Tests Unitarios
      - name: Ejecutar Tests Unitarios
        run: bun run test:coverage
        env:
          CI: true

      # 3. Verificación de Build
      - name: Validar compilación de TypeScript
        run: bunx tsc --noEmit
